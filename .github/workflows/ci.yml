name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test
        run: cargo test --all-features
      - name: Self-scan (dogfood)
        run: cargo run --release -- .

  # Mirror the Cloudflare deploy: a frozen-lockfile install fails if bun.lock and
  # package.json drift (e.g. a Dependabot bump that didn't touch the lockfile),
  # and the build catches anything that would break the static export.
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: build
        run: bun run build
